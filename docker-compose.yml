services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-this-local-secret}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://parcel_tracker:parcel_tracker@postgres:5432/parcel_tracker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/gmail/callback}

    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: arq app.worker.settings.WorkerSettings
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-this-local-secret}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://parcel_tracker:parcel_tracker@postgres:5432/parcel_tracker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/gmail/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: parcel_tracker
      POSTGRES_USER: parcel_tracker
      POSTGRES_PASSWORD: parcel_tracker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parcel_tracker -d parcel_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
